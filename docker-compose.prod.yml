# Production backend only. Frontend deploys separately.
# Usage: cp .env.example .env  # edit for production, then:
#        docker compose -f docker-compose.prod.yml up -d --build

name: nba-scoreboard

services:
  fastapi:
    build: ./nba-api
    container_name: nba-scoreboard-data
    restart: unless-stopped
    env_file: .env
    environment:
      NBA_API_PROXY: ${NBA_API_PROXY:-}
    networks:
      - nba-scoreboard-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  springboot:
    build: .
    container_name: nba-scoreboard-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      FASTAPI_BASE_URL: http://fastapi:8000
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      SERVER_URL: ${SERVER_URL}
      # e2-micro (1 GB): cap JVM heap so FastAPI + OS are not OOM-killed
      JAVA_TOOL_OPTIONS: "-Xmx384m -Xms128m"
    depends_on:
      fastapi:
        condition: service_healthy
    networks:
      - nba-scoreboard-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 120s

networks:
  nba-scoreboard-network:
    driver: bridge
